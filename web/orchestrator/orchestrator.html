<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>SentinelFlow Orchestrator</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
<main class="orchRoot">
    <section class="orchCard">
        <h1 class="orchTitle">Orchestrator Dashboard</h1>

        <section class="orchPanel active">
            <fieldset class="orchBlock clusterRegBar">
                <legend>Add Cluster</legend>

                <div class="clusterRegGrid">
                    <div class="clusterRegItem">
                        <label for="addClusterBaseUrl">Address</label>
                        <input id="addClusterBaseUrl" type="text" placeholder="10.0.0.10:8000 or http://10.0.0.10:8000" />
                    </div>

                    <div class="clusterRegItem">
                        <label for="addClusterLabel">Label</label>
                        <input id="addClusterLabel" type="text" placeholder="Optional label" />
                    </div>

                    <div class="buttons clusterRegActions">
                        <button id="btnAddCluster" class="primary" type="button">Add</button>
                        <button id="btnDashboardRefresh" type="button">Refresh</button>
                    </div>
                </div>

                <div class="orchSubHint">Each cluster card has its own app and capture controls.</div>
            </fieldset>

            <div class="row">
                <label>Automation Editor</label>
                <div class="buttons">
                    <a class="primary" href="/automation">Open Automation Editor</a>
                </div>
            </div>

            <div class="row">
                <label>Cluster Screens</label>
                <div id="cctvGrid" class="cctvGrid"></div>
            </div>
        </section>

        <div class="row">
            <label>Manage Status</label>
            <div id="manageStatus" class="status" aria-live="polite"></div>
        </div>

        <div class="orchHint">Use `http://127.0.0.1:PORT/` in your browser.</div>
    </section>
</main>

<script src="/static/state.js"></script>
<script src="/static/api.js"></script>
<script src="/static/automationUi.js"></script>
<script src="/static/cctv.js"></script>
<script src="/static/clusterControls.js"></script>
<script src="/static/orchestrator.js"></script>
</body>
</html>
