<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>SentinelFlow Orchestrator</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
<main class="orchRoot">
    <section class="orchCard">
        <h1 class="orchTitle">Orchestrator Dashboard</h1>

        <section class="orchPanel active">
            <fieldset class="orchBlock">
                <legend>Clusters</legend>

                <div class="row">
                    <label for="addClusterBaseUrl">Cluster Address</label>
                    <input id="addClusterBaseUrl" type="text" placeholder="Example: 10.0.0.10:8000 (or http://10.0.0.10:8000)" />
                    <div class="orchSubHint">The orchestrator will call <span class="mono">/api/server/info</span> to auto-discover the cluster UUID.</div>
                </div>

                <div class="row">
                    <label for="addClusterLabel">Label (optional)</label>
                    <input id="addClusterLabel" type="text" placeholder="Optional cluster label" />
                </div>

                <div class="buttons">
                    <button id="btnAddCluster" class="primary" type="button">Add Cluster</button>
                    <button id="btnDashboardRefresh" type="button">Refresh Dashboard</button>
                </div>

                <div class="orchSubHint">Each cluster card has its own app and capture controls.</div>
            </fieldset>

            <div class="row">
                <label>Cluster Screens</label>
                <div id="cctvGrid" class="cctvGrid"></div>
            </div>
        </section>

        <div class="row">
            <label>Manage Status</label>
            <div id="manageStatus" class="status" aria-live="polite"></div>
        </div>

        <div class="orchHint">Use `http://127.0.0.1:PORT/` in your browser.</div>
    </section>
</main>

<script src="/static/orchestrator.js"></script>
</body>
</html>
