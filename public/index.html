<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>SentinelFlow Backend</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>

<main class="appRoot">

    <!-- ================================================= -->
    <!-- LIVE IMAGE VIEW (PRIMARY, NEVER AFFECTED)        -->
    <!-- ================================================= -->
    <section class="livePreviewRoot">
        <div class="livePreviewFrame">
            <img
                id="captureImage"
                class="captureImage"
                alt="Window capture preview"
            />
        </div>
        
    </section>

    <section class="statusPanel">
        <fieldset>
            <legend>Status</legend>
            <div id="status" class="status" aria-live="polite"></div>
        </fieldset>
    </section>
    <!-- ================================================= -->
    <!-- CONTROL WORKSPACE (FUNCTION-SEPARATED TABS)      -->
    <!-- ================================================= -->
    <section class="controlWorkspace">

        <nav class="controlTabs">
            <button class="active" data-tab="launcher">Launcher</button>
            <button data-tab="capture">Capture</button>
            <button data-tab="input">Input</button>
            </nav>

        <section id="tab-launcher" class="tabPanel active">
            <fieldset>
                <legend>Application Launcher</legend>

                <div class="row">
                    <label for="appPath">App path (or command)</label>
                    <input
                        id="appPath"
                        type="text"
                        value="C:\Users\HONG\Desktop\frozenthrone1.26\war3.exe -window"
                    />
                </div>

                <div class="row">
                    <label for="windowTitle">Window title</label>
                    <input
                        id="windowTitle"
                        type="text"
                        value="Warcraft III"
                    />
                </div>

                <div class="grid2">
                    <div class="row">
                        <label for="windowLeft">Window left</label>
                        <input id="windowLeft" type="text" value="0" />
                    </div>
                    <div class="row">
                        <label for="windowTop">Window top</label>
                        <input id="windowTop" type="text" value="0" />
                    </div>
                    <div class="row">
                        <label for="windowWidth">Window width</label>
                        <input id="windowWidth" type="text" value="640" />
                    </div>
                    <div class="row">
                        <label for="windowHeight">Window height</label>
                        <input id="windowHeight" type="text" value="480" />
                    </div>
                </div>

                <div class="buttons">
                    <button id="btnLaunch" class="primary" type="button">Launch</button>
                    <button id="btnAttach" class="primary" type="button">Attach</button>
                    <button id="btnClose" class="danger" type="button">Close</button>
                </div>
            </fieldset>
        </section>

        <section id="tab-capture" class="tabPanel">
            <fieldset>
                <legend>Capture Control</legend>

                <div class="row">
                    <label for="captureInterval">Refresh interval (seconds)</label>
                    <input id="captureInterval" type="text" value="1" />
                </div>

                <div class="buttons">
                    <button id="btnStartCapture" class="primary" type="button">Start Capture</button>
                    <button id="btnStopCapture" type="button">Stop Capture</button>
                </div>
            </fieldset>
        </section>

        <section id="tab-input" class="tabPanel">
            <fieldset>
                <legend>Input Injection</legend>

                <div class="grid2">
                    <div class="row">
                        <label for="clickX">Click X (0~1)</label>
                        <input id="clickX" type="text" placeholder="0.500" />
                    </div>
                    <div class="row">
                        <label for="clickY">Click Y (0~1)</label>
                        <input id="clickY" type="text" placeholder="0.500" />
                    </div>
                </div>

                <div class="buttons">
                    <button id="btnSendClick" class="primary" type="button">Send Click</button>
                </div>

                <div class="row">
                    <label for="keyName">Key name</label>
                    <input id="keyName" type="text" placeholder="Example: Enter, F5, A" />
                </div>

                <div class="buttons">
                    <button id="btnSendKey" class="primary" type="button">Send Key</button>
                </div>
            </fieldset>
        </section>


    </section>

</main>

<script src="/static/app.js"></script>
</body>
</html>
